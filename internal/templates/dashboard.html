<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SecretHub - Dashboard</title>
<link rel="stylesheet" href="/static/styles.css">
<script defer src="/static/dashboard.js"></script>
<script defer src="/static/alpine.min.js"></script>
</head>
<body>
<div id="app" x-data="dashboardApp()">
  <header>
    <strong>🔐 SecretHub</strong>
    <span class="session-expiry" x-text="sessionExpiry"></span>
    <span class="header-right">
      <a href="#/settings" class="link" x-on:click.prevent="showSettings">Settings</a>
      <a href="/api/logout" class="link">Sair</a>
    </span>
  </header>

  <div class="toast" x-show="toast" x-text="toast" x-transition.opacity.duration.300ms></div>

  <div class="layout">
    <aside>
      <h3>Vaults</h3>
      <ul>
        <template x-for="name in vaults" :key="name">
          <li>
            <a href="#" x-text="name" x-on:click.prevent="navigate(name)"
               :class="{ active: view === 'vault' && vaultName === name }"></a>
          </li>
        </template>
      </ul>
      <form class="inline-form" x-on:submit.prevent="createVault">
        <input type="text" x-model="newVaultName" placeholder="New vault name" required>
        <button type="submit" :disabled="!newVaultName.trim()">+</button>
      </form>
    </aside>

    <main>
      <div class="loader" x-show="loading">
        <div class="spinner"></div>
      </div>

      <div x-show="view === 'home'" x-transition.opacity.duration.200ms>
        <h2>Welcome to SecretHub</h2>
        <p>Select a vault from the sidebar or create a new one.</p>
      </div>

      <div x-show="view === 'vault'" x-transition.opacity.duration.200ms>
        <div class="vault-header">
          <h2 x-text="vaultName"></h2>
          <div class="vault-actions">
            <button x-on:click="exportVault">Export .env</button>
            <button x-on:click="copyAll">Copy All</button>
          </div>
        </div>
        <table>
          <thead><tr><th>Key</th><th>Value</th><th>Ações</th></tr></thead>
          <tbody>
            <template x-for="(value, key) in vaultData" :key="key">
              <tr>
                <td x-text="key" class="key-cell"></td>
                <td><input :type="showKeys[key] ? 'text' : 'password'" x-model="vaultData[key]" class="val-input"></td>
                <td class="actions-cell">
                  <button x-on:click="toggleKey(key)" x-text="showKeys[key] ? '🙈' : '👁️'" title="Mostrar/ocultar"></button>
                  <button x-on:click="copyKey(key)" title="Copiar">📋</button>
                  <button x-on:click="deleteKey(key)" title="Excluir">🗑️</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
        <form class="inline-form" x-on:submit.prevent="addKey">
          <input type="text" x-model="newKey" placeholder="Key" required>
          <input type="text" x-model="newValue" placeholder="Value">
          <button type="submit">+ Add</button>
        </form>
        <div class="save-bar">
          <button x-on:click="saveVault" :disabled="loading">💾 Save</button>
        </div>
      </div>

      <div x-show="view === 'settings'" x-transition.opacity.duration.200ms>
        <h2>Settings</h2>
        <p>Settings will be available in a future update.</p>
      </div>
    </main>
  </div>
</div>
</body>
</html>
