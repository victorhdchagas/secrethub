services:
  secrethub:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "127.0.0.1:4949:4949"
    volumes:
      - secrethub-data:/root/.secrethub
    environment:
      - TZ=America/Sao_Paulo
    restart: unless-stopped

  # Cloudflare Tunnel (opcional):
  #   1. Crie um tunnel no dashboard Cloudflare
  #   2. `docker compose run tunnel tunnel login`
  #   3. `docker compose run tunnel tunnel create secrethub`
  #   4. Copie o token do arquivo JSON gerado
  #   5. Crie um arquivo .env com CF_TUNNEL_TOKEN=...
  #   6. Descomente abaixo e execute `docker compose up -d`
  #
  # tunnel:
  #   image: cloudflare/cloudflared:latest
  #   command: tunnel run
  #   environment:
  #     - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
  #   restart: unless-stopped
  #   network_mode: service:secrethub

volumes:
  secrethub-data:
